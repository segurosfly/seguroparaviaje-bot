<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPV Intelligence Bot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }
header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 1.2rem; font-weight: 600; }
header span { background: #238636; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
.kpi { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.kpi .label { font-size: 0.75rem; color: #7d8590; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.kpi .value { font-size: 1.6rem; font-weight: 700; color: #58a6ff; }
.kpi .sub { font-size: 0.75rem; color: #7d8590; margin-top: 4px; }
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
.chart-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.chart-box h3 { font-size: 0.85rem; color: #7d8590; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
@media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
.table-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.table-box h3 { font-size: 0.85rem; color: #7d8590; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
thead th { background: #0d1117; color: #7d8590; text-align: left; padding: 8px 12px; border-bottom: 1px solid #30363d; }
tbody tr { border-bottom: 1px solid #21262d; }
tbody tr:hover { background: #1c2128; }
tbody td { padding: 10px 12px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; }
.badge-e { background: #1f2937; color: #93c5fd; }
.badge-s { background: #1a2e1a; color: #86efac; }
.badge-i { background: #2d1a2e; color: #c4b5fd; }
.empty-state { text-align: center; padding: 60px 20px; color: #7d8590; }
.empty-state .icon { font-size: 3rem; margin-bottom: 16px; }
.empty-state h2 { font-size: 1.1rem; color: #e6edf3; margin-bottom: 8px; }
.empty-state p { font-size: 0.85rem; }
.status-bar { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 24px; font-size: 0.75rem; color: #7d8590; display: flex; gap: 20px; align-items: center; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.dot-ok { background: #3fb950; }
.dot-warn { background: #d29922; }
</style>
</head>
<body>
<header>
  <div>
    <h1>SPV Intelligence Bot <span>LIVE</span></h1>
  </div>
</header>
<div class="status-bar" id="statusBar">
  <span id="statusDot"><span class="dot dot-warn"></span></span>
  <span id="statusText">Cargando datos...</span>
</div>
<div class="container">
  <div class="kpi-grid">
    <div class="kpi"><div class="label">Registros Totales</div><div class="value" id="kpiTotal">&#8212;</div><div class="sub">cotizaciones guardadas</div></div>
    <div class="kpi"><div class="label">Última Actualizacion</div><div class="value" id="kpiDate" style="font-size:1.1rem">&#8212;</div><div class="sub">fecha mas reciente</div></div>
    <div class="kpi"><div class="label">Plan Esencial (30d)</div><div class="value" id="kpiEsencial">&#8212;</div><div class="sub">ultimo precio COP</div></div>
    <div class="kpi"><div class="label">Plan Ideal (30d)</div><div class="value" id="kpiIdeal">&#8212;</div><div class="sub">ultimo precio COP</div></div>
  </div>
  <div class="charts">
    <div class="chart-box"><h3>Precios 30 dias - Evolucion</h3><canvas id="chart30"></canvas></div>
    <div class="chart-box"><h3>Comparacion por duracion</h3><canvas id="chartDur"></canvas></div>
  </div>
  <div class="table-box">
    <h3>Historial de Cotizaciones</h3>
    <div id="tableContent"></div>
  </div>
</div>
<script>
(function() {
  var SHEET_ID = "1-jBJ7c1cIHcwIplAHU1fH0ETZRm0GEdy7jvGewF5cKU";
  var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json&sheet=Sheet1";

  function fmt(n) {
    if (!n && n !== 0) return "—";
    return "$" + Number(n).toLocaleString("es-CO");
  }

  function showEmpty() {
    document.getElementById("statusDot").innerHTML = '<span class="dot dot-warn"></span>';
    document.getElementById("statusText").textContent = "Sin datos aun — el bot ejecutara su primera corrida a las 7:00 AM COT";
    document.getElementById("tableContent").innerHTML = '<div class="empty-state"><div class="icon">📊</div><h2>Sin datos todavia</h2><p>El bot ejecutara su primera corrida automatica a las 7:00 AM COT.<br>Los datos apareceran aqui automaticamente.</p></div>';
  }

  function parseGviz(text) {
    var idx = text.indexOf("google.visualization.Query.setResponse(");
    if (idx === -1) return null;
    var start = idx + "google.visualization.Query.setResponse(".length;
    var end = text.lastIndexOf(")");
    if (end <= start) return null;
    try {
      return JSON.parse(text.substring(start, end));
    } catch(e) { return null; }
  }

  function render(rows) {
    if (!rows || rows.length === 0) { showEmpty(); return; }
    document.getElementById("kpiTotal").textContent = rows.length;
    var last = rows[rows.length - 1];
    document.getElementById("kpiDate").textContent = last[0] ? last[0].toString().substring(0, 10) : "—";
    var rows30 = rows.filter(function(r) { return Number(r[1]) === 30; });
    if (rows30.length > 0) {
      var last30 = rows30[rows30.length - 1];
      document.getElementById("kpiEsencial").textContent = fmt(last30[3]);
      document.getElementById("kpiIdeal").textContent = fmt(last30[5]);
    }
    var labels30 = rows30.map(function(r) { return r[0] ? r[0].toString().substring(0, 10) : ""; });
    var esencial30 = rows30.map(function(r) { return Number(r[3]) || 0; });
    var estandar30 = rows30.map(function(r) { return Number(r[4]) || 0; });
    var ideal30 = rows30.map(function(r) { return Number(r[5]) || 0; });
    var ctx30 = document.getElementById("chart30").getContext("2d");
    new Chart(ctx30, { type: "line", data: { labels: labels30, datasets: [ { label: "Esencial", data: esencial30, borderColor: "#58a6ff", backgroundColor: "rgba(88,166,255,0.1)", tension: 0.3 }, { label: "Estandar", data: estandar30, borderColor: "#3fb950", backgroundColor: "rgba(63,185,80,0.1)", tension: 0.3 }, { label: "Ideal", data: ideal30, borderColor: "#c4b5fd", backgroundColor: "rgba(196,181,253,0.1)", tension: 0.3 } ] }, options: { responsive: true, plugins: { legend: { labels: { color: "#7d8590", font: { size: 11 } } } }, scales: { x: { ticks: { color: "#7d8590", maxRotation: 45 } }, y: { ticks: { color: "#7d8590", callback: function(v) { return "$" + (v/1000).toFixed(0) + "k"; } } } } } });
    var durs = [10, 20, 30];
    var esencialByDur = [], estandarByDur = [], idealByDur = [];
    durs.forEach(function(d) {
      var rd = rows.filter(function(r) { return Number(r[1]) === d; });
      if (rd.length > 0) {
        var lr = rd[rd.length - 1];
        esencialByDur.push(Number(lr[3]) || 0);
        estandarByDur.push(Number(lr[4]) || 0);
        idealByDur.push(Number(lr[5]) || 0);
      } else {
        esencialByDur.push(0); estandarByDur.push(0); idealByDur.push(0);
      }
    });
    var ctxDur = document.getElementById("chartDur").getContext("2d");
    new Chart(ctxDur, { type: "bar", data: { labels: ["10 dias", "20 dias", "30 dias"], datasets: [ { label: "Esencial", data: esencialByDur, backgroundColor: "rgba(88,166,255,0.7)" }, { label: "Estandar", data: estandarByDur, backgroundColor: "rgba(63,185,80,0.7)" }, { label: "Ideal", data: idealByDur, backgroundColor: "rgba(196,181,253,0.7)" } ] }, options: { responsive: true, plugins: { legend: { labels: { color: "#7d8590", font: { size: 11 } } } }, scales: { x: { ticks: { color: "#7d8590" } }, y: { ticks: { color: "#7d8590", callback: function(v) { return "$" + (v/1000).toFixed(0) + "k"; } } } } } });
    var html = "<table><thead><tr><th>Fecha</th><th>Dias</th><th>Ruta</th><th>Esencial</th><th>Estandar</th><th>Ideal</th></tr></thead><tbody>";
    var display = rows.slice(-50).reverse();
    display.forEach(function(r) {
      var dur = Number(r[1]);
      html += "<tr><td>" + (r[0] ? r[0].toString().substring(0, 16) : "—") + "</td><td>" + (dur || "—") + " d</td><td>" + (r[2] || "—") + "</td><td><span class='badge badge-e'>" + fmt(r[3]) + "</span></td><td><span class='badge badge-s'>" + fmt(r[4]) + "</span></td><td><span class='badge badge-i'>" + fmt(r[5]) + "</span></td></tr>";
    });
    html += "</tbody></table>";
    document.getElementById("tableContent").innerHTML = html;
    document.getElementById("statusDot").innerHTML = '<span class="dot dot-ok"></span>';
    document.getElementById("statusText").textContent = "Actualizado — " + rows.length + " registros cargados";
  }

  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(text) {
      var parsed = parseGviz(text);
      if (!parsed) { showEmpty(); return; }
      var table = parsed.table;
      if (!table || !table.rows || table.rows.length === 0) { showEmpty(); return; }
      var rows = table.rows.map(function(row) {
        return row.c.map(function(cell) { return cell ? cell.v : null; });
      });
      render(rows);
    })
    .catch(function(e) { showEmpty(); });
})();
</script>
</body>
</html>
