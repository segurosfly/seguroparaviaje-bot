<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPV Intelligence Bot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }
header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; }
header h1 { font-size: 1.2rem; font-weight: 600; display: inline; }
header .badge { background: #238636; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 12px; margin-left: 10px; }
.status-bar { background: #161b22; border-bottom: 1px solid #30363d; padding: 8px 24px; font-size: 0.75rem; color: #7d8590; display: flex; align-items: center; gap: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot-ok { background: #3fb950; }
.dot-warn { background: #d29922; }
.dot-err { background: #f85149; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.kpi { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.kpi .lbl { font-size: 0.72rem; color: #7d8590; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
.kpi .val { font-size: 1.5rem; font-weight: 700; color: #58a6ff; }
.kpi .sub { font-size: 0.72rem; color: #7d8590; margin-top: 4px; }
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
@media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
.box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
.box h3 { font-size: 0.8rem; color: #7d8590; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
thead th { background: #0d1117; color: #7d8590; text-align: left; padding: 8px 10px; border-bottom: 1px solid #30363d; }
tbody tr:nth-child(even) { background: #0d1117; }
tbody tr:hover { background: #1c2128; }
tbody td { padding: 9px 10px; border-bottom: 1px solid #21262d; }
.e { color: #93c5fd; } .s { color: #86efac; } .i { color: #c4b5fd; }
.empty { text-align: center; padding: 60px 20px; color: #7d8590; }
.empty .ico { font-size: 2.5rem; margin-bottom: 12px; }
.empty h2 { font-size: 1rem; color: #e6edf3; margin-bottom: 8px; }
</style>
</head>
<body>
<header>
  <h1>SPV Intelligence Bot</h1><span class="badge">LIVE</span>
  <span style="float:right; font-size:0.75rem; color:#7d8590; line-height:2.2rem">seguroparaviaje.com.co</span>
</header>
<div class="status-bar">
  <span class="dot dot-warn" id="statusDot"></span>
  <span id="statusText">Cargando...</span>
</div>
<div class="container">
  <div class="kpi-grid">
    <div class="kpi"><div class="lbl">Total Registros</div><div class="val" id="kpiTotal">—</div><div class="sub">cotizaciones</div></div>
    <div class="kpi"><div class="lbl">Ultima Corrida</div><div class="val" id="kpiDate" style="font-size:1rem">—</div><div class="sub">fecha/hora UTC</div></div>
    <div class="kpi"><div class="lbl">Esencial 30d</div><div class="val" id="kpiE30">—</div><div class="sub">ultimo COP</div></div>
    <div class="kpi"><div class="lbl">Ideal 30d</div><div class="val" id="kpiI30">—</div><div class="sub">ultimo COP</div></div>
  </div>
  <div class="charts">
    <div class="box"><h3>Tendencia precios por plan</h3><canvas id="chartPlans"></canvas></div>
    <div class="box"><h3>Comparacion por duracion (ultima)</h3><canvas id="chartDur"></canvas></div>
  </div>
  <div class="box">
    <h3>Historial completo</h3>
    <div id="tbl"></div>
  </div>
</div>
<script>
(function() {
  var SID = "1-jBJ7c1cIHcwIplAHU1fH0ETZRm0GEdy7jvGewF5cKU";
  var url = "https://docs.google.com/spreadsheets/d/" + SID + "/gviz/tq?tqx=out:json&sheet=Sheet1";

  function cop(n) {
    if (!n && n !== 0) return "—";
    var num = Number(n);
    if (isNaN(num)) return "—";
    return "$" + num.toLocaleString("es-CO");
  }

  function setStatus(color, msg) {
    document.getElementById("statusDot").className = "dot " + color;
    document.getElementById("statusText").textContent = msg;
  }

  function showEmpty() {
    setStatus("dot-warn", "Sin datos — el bot aun no ha ejecutado");
    var el = document.getElementById("tbl");
    el.innerHTML = "";
    var div = document.createElement("div");
    div.className = "empty";
    div.innerHTML = "<div class='ico'>📊</div><h2>Sin datos todavia</h2><p>El bot correra a las 7:00 AM COT.</p>";
    el.appendChild(div);
  }

  function parseGviz(text) {
    var idx = text.indexOf("google.visualization.Query.setResponse(");
    if (idx < 0) return null;
    var s = idx + 40;
    var e = text.lastIndexOf(")");
    if (e <= s) return null;
    try { return JSON.parse(text.substring(s, e)); } catch(x) { return null; }
  }

  function render(rows) {
    var data = rows.slice(1).filter(function(r) { return r[0] && r[3]; });
    if (data.length === 0) { showEmpty(); return; }

    document.getElementById("kpiTotal").textContent = data.length;
    var last = data[data.length - 1];
    document.getElementById("kpiDate").textContent = (last[0]||"") + " " + (last[1]||"");

    var e30 = data.filter(function(r) { return Number(r[2])===30 && String(r[3]).toLowerCase().indexOf("esencial")>=0; });
    var i30 = data.filter(function(r) { return Number(r[2])===30 && String(r[3]).toLowerCase().indexOf("ideal")>=0; });
    if (e30.length>0) document.getElementById("kpiE30").textContent = cop(e30[e30.length-1][4]);
    if (i30.length>0) document.getElementById("kpiI30").textContent = cop(i30[i30.length-1][4]);

    var clrs = ["#58a6ff","#3fb950","#c4b5fd"];
    var bgs = ["rgba(88,166,255,0.15)","rgba(63,185,80,0.15)","rgba(196,181,253,0.15)"];
    var eR = data.filter(function(r) { return String(r[3]).toLowerCase().indexOf("esencial")>=0; });
    var sR = data.filter(function(r) { return String(r[3]).toLowerCase().indexOf("ndar")>=0; });
    var iR = data.filter(function(r) { return String(r[3]).toLowerCase().indexOf("ideal")>=0; });
    var labs = eR.slice(-10).map(function(r) { return (r[0]||"").substring(0,10)+" "+r[2]+"d"; });
    new Chart(document.getElementById("chartPlans").getContext("2d"),{
      type:"line", data:{ labels:labs, datasets:[
        {label:"Esencial",data:eR.slice(-10).map(function(r){return Number(r[4])||0;}),borderColor:clrs[0],backgroundColor:bgs[0],tension:0.3},
        {label:"Estandar",data:sR.slice(-10).map(function(r){return Number(r[4])||0;}),borderColor:clrs[1],backgroundColor:bgs[1],tension:0.3},
        {label:"Ideal",data:iR.slice(-10).map(function(r){return Number(r[4])||0;}),borderColor:clrs[2],backgroundColor:bgs[2],tension:0.3}
      ]},
      options:{responsive:true,plugins:{legend:{labels:{color:"#7d8590"}}},
        scales:{x:{ticks:{color:"#7d8590",maxRotation:45}},y:{ticks:{color:"#7d8590",callback:function(v){return "$"+(v/1000).toFixed(0)+"k";}}}}}
    });
    var durs=[10,20,30];
    var plans=["Esencial","Estandar","Ideal"];
    var bgs2=["rgba(88,166,255,0.7)","rgba(63,185,80,0.7)","rgba(196,181,253,0.7)"];
    var dsets=plans.map(function(plan,pi){
      var vals=durs.map(function(d){
        var key=plan.toLowerCase().substring(0,4);
        var sub=data.filter(function(r){return Number(r[2])===d&&String(r[3]).toLowerCase().indexOf(key)>=0;});
        return sub.length>0?(Number(sub[sub.length-1][4])||0):0;
      });
      return {label:plan,data:vals,backgroundColor:bgs2[pi],borderColor:clrs[pi],borderWidth:1};
    });
    new Chart(document.getElementById("chartDur").getContext("2d"),{
      type:"bar",data:{labels:["10 dias","20 dias","30 dias"],datasets:dsets},
      options:{responsive:true,plugins:{legend:{labels:{color:"#7d8590"}}},
        scales:{x:{ticks:{color:"#7d8590"}},y:{ticks:{color:"#7d8590",callback:function(v){return "$"+(v/1000).toFixed(0)+"k";}}}}}
    });

    var h="<table><thead><tr><th>Fecha</th><th>Hora</th><th>Dias</th><th>Plan</th><th>Precio COP</th><th>Descuento</th><th>Cambio</th><th>Estado</th></tr></thead><tbody>";
    data.slice(-60).reverse().forEach(function(r){
      var pl=String(r[3]||"").toLowerCase();
      var cls=pl.indexOf("esencial")>=0?"e":pl.indexOf("ndar")>=0?"s":pl.indexOf("ideal")>=0?"i":"";
      h+="<tr><td>"+(r[0]||"—")+"</td><td>"+(r[1]||"—")+"</td><td>"+(r[2]||"—")+"</td>";
      h+="<td class='"+cls+"'>"+(r[3]||"—")+"</td><td>"+cop(r[4])+"</td><td>"+(r[5]||"—")+"</td><td>"+(r[7]||"—")+"</td><td>"+(r[8]||"—")+"</td></tr>";
    });
    h+="</tbody></table>";
    document.getElementById("tbl").innerHTML=h;
    setStatus("dot-ok","Actualizado — "+data.length+" registros cargados");
  }

  fetch(url).then(function(r){return r.text();}).then(function(t){
    var p=parseGviz(t);
    if(!p||!p.table||!p.table.rows||p.table.rows.length<=1){showEmpty();return;}
    render(p.table.rows.map(function(row){return row.c.map(function(c){return c?c.v:null;});}));
  }).catch(function(){showEmpty();});
})();
</script>
</body>
</html>
